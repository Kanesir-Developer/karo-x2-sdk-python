}

enum Visibility {
  VISIBILITY_UNSPECIFIED = 0;
  VISIBILITY_PUBLIC = 1;
  VISIBILITY_INTERNAL = 2;
  VISIBILITY_ADMIN = 3;
  VISIBILITY_PARTNER = 4;
}

enum EntityClass {
  ENTITY_CLASS_UNSPECIFIED = 0;
  ENTITY_CLASS_REACTIVE = 1;
  ENTITY_CLASS_CACHEABLE = 2;
  ENTITY_CLASS_STATIC = 3;
  ENTITY_CLASS_TIMESERIES = 4;
}

